<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- App icon background: orange with iOS-style rounded corners -->
  <rect width="512" height="512" rx="114" ry="114" fill="#F28500"/>

  <!-- Subtle inner glow / depth on background -->
  <rect width="512" height="512" rx="114" ry="114" fill="url(#vignette)" opacity="0.25"/>

  <!-- Geometric T mark (logomark) centered at top -->
  <!-- Horizontal bar of T -->
  <rect x="148" y="120" width="216" height="40" rx="10" ry="10" fill="#1A1A1A"/>
  <!-- Vertical bar of T -->
  <rect x="216" y="120" width="80" height="148" rx="10" ry="10" fill="#1A1A1A"/>

  <!-- Wordmark: "Ta" in near-black, "mia" in green -->
  <!-- Using geometric letter paths for clean rendering -->
  <text
    x="256"
    y="438"
    font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
    font-size="148"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-4"
    fill="#1A1A1A"
  >Ta<tspan fill="#00B53F">mia</tspan></text>

  <!-- Bottom divider line -->
  <rect x="160" y="358" width="192" height="5" rx="2.5" fill="#ffffff" opacity="0.3"/>

  <defs>
    <radialGradient id="vignette" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
</svg>
